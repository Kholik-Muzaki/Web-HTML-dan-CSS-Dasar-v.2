<html>
    <head>
        <title> text dan text area</title>
    </head>
    <body>
        <label for="nama">Nama Lengkap</label>
        <input type="text" name="nama" />
        <!__ini label dan text tanpa value__>
        <br>
        <label for="name">Nama Lengkap</label>
        <input type="text" name="nama" value="tulis nama lengkap" />
        <!__ini label dan text dengan value__>
        <br>
        <label for="alamat">Alamat</label>
        <textarea name="alamat"></textarea>
    </body>
</html>
