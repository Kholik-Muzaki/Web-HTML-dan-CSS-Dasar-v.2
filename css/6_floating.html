<html>
    <head>
        <title>floating</title>
        <style>
            #wrapper{
                height: 960px;
                margin: 0 auto; /*agar wrapper tetap ditengah*/
            }

            #header{
                width: 100px;
                height: 50px;
                background: orange;
                margin-bottom: 10px;
            }

            #content{
                padding: 20px;
                background: green;
                margin-bottom: 10px;
            }

            #artikel{
                width: 600px;
                height: 700px;
                float: left;
                background: orange;
            }

            #sidebar{
                width: 300px;
                height: 200px;
                background: orange;
                float: right;
            }

            #footer{
                width: 100px;
                height: 50px;
                background: green;
            }
        </style>
    </head>
    <body>
        <div id="wrapper">
       
            <div id="header">

            </div>

            <div id="content">
                <div id="artikel"></div>

                <div id="sidebar"></div>
            </div>

            <div id="footer">
            
            </div>
        
        </div>
    </body>
</html>
